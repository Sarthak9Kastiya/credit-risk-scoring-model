<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Scoring Model for Banks</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-animated"></div>
    
    <div class="container">
        <header>
            <h1>Credit Risk Scoring Model for Banks</h1>
            <p>Predict loan default risk with advanced machine learning</p>
        </header>
        
        <main class="glass-card">
            <form id="loan-form">
                <div class="form-grid">
                    <div class="input-group">
                        <label for="customer_age">Age</label>
                        <input type="number" id="customer_age" name="customer_age" placeholder="e.g. 35" required min="18" max="100">
                    </div>

                    <div class="input-group">
                        <label for="customer_income">Annual Income (£)</label>
                        <input type="number" id="customer_income" name="customer_income" placeholder="e.g. 60000" required min="0">
                    </div>

                    <div class="input-group">
                        <label for="employment_duration">Employment Duration (Years)</label>
                        <input type="number" id="employment_duration" name="employment_duration" placeholder="e.g. 5" required min="0" step="0.1">
                    </div>

                    <div class="input-group">
                        <label for="loan_amnt">Loan Amount (£)</label>
                        <input type="number" id="loan_amnt" name="loan_amnt" placeholder="e.g. 10000" required min="100">
                    </div>

                    <div class="input-group">
                        <label for="term_years">Term (Years)</label>
                        <input type="number" id="term_years" name="term_years" placeholder="e.g. 10" required min="1">
                    </div>

                    <div class="input-group">
                        <label for="cred_hist_length">Credit History Length (Years)</label>
                        <input type="number" id="cred_hist_length" name="cred_hist_length" placeholder="e.g. 3" required min="0">
                    </div>

                    <div class="input-group">
                        <label for="credit_score">Credit Score</label>
                        <input type="number" id="credit_score" name="credit_score" placeholder="e.g. 700" required min="0">
                    </div>

                    <div class="input-group">
                        <label for="home_ownership">Home Ownership</label>
                        <select id="home_ownership" name="home_ownership" required>
                            <option value="RENT">Rent</option>
                            <option value="OWN">Own</option>
                            <option value="MORTGAGE">Mortgage</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>

                    <div class="input-group full-width">
                        <label for="loan_intent">Loan Intent</label>
                        <select id="loan_intent" name="loan_intent" required>
                            <option value="PERSONAL">Personal</option>
                            <option value="EDUCATION">Education</option>
                            <option value="MEDICAL">Medical</option>
                            <option value="HOMEIMPROVEMENT">Home Improvement</option>
                            <option value="VENTURE">Venture</option>
                            <option value="DEBTCONSOLIDATION">Debt Consolidation</option>
                        </select>
                    </div>
                </div>

                <div class="submit-container">
                    <button type="submit" id="submit-btn">
                        <span>Evaluate Risk</span>
                        <div class="loader" id="submit-loader" style="display: none;"></div>
                    </button>
                </div>
            </form>
        </main>
    </div>

    <!-- Result Modal -->
    <div class="modal-overlay" id="result-modal">
        <div class="modal glass-card">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2 id="result-title">Analysis Complete</h2>
            <div class="result-details">
                <div class="result-item">
                    <span class="label">Status</span>
                    <span class="value" id="res-status">--</span>
                </div>
                <div class="result-item">
                    <span class="label">Assigned Interest Rate</span>
                    <span class="value" id="res-rate">--</span>
                </div>
                <div class="result-item">
                    <span class="label">Loan Grade</span>
                    <span class="value" id="res-grade">--</span>
                </div>
                <div class="result-item">
                    <span class="label">Default Probability</span>
                    <span class="value" id="res-prob">--</span>
                </div>
            </div>
            <p id="res-message"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
